<title>BulkLog — Fitness Tracker</title>

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "BulkLog — Fitness Tracker",
  short_name: "BulkLog",
  description: "Track your lifts, body weight and progress",
  start_url: "./",
  display: "standalone",
  background_color: "#0d0d0d",
  theme_color: "#0d0d0d",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230d0d0d'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle' fill='%23c8ff00'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230d0d0d'/%3E%3Ctext x='256' y='340' font-size='300' text-anchor='middle' fill='%23c8ff00'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement("link");
link.rel = "manifest"; link.href = manifestURL;
document.head.appendChild(link);
</script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --card: #181818;
  --card2: #1e1e1e;
  --border: #252525;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.1);
  --accent-border: rgba(200,255,0,0.25);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --blue: #7dd3fc;
  --yellow: #fbbf24;
  --red: #f87171;
  --green: #4ade80;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 15px;
  overflow-x: hidden; overscroll-behavior: none;
}

#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── HEADER ── */
.header {
  padding: calc(var(--safe-top) + 16px) 18px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.header-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 2px; }
.header-main { display: flex; align-items: baseline; justify-content: space-between; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 0.02em; }
.header-kg { color: var(--accent); }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 80px; z-index: 99;
}
.tab-btn {
  flex: 1; padding: 12px 6px; text-align: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: color 0.15s, border-color 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── BODY ── */
.body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 80px); }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.card-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-weight: 700; font-size: 14px; }
.card-meta { font-size: 11px; color: var(--muted); }
.card-body { padding: 14px 16px; }

/* ── INPUTS ── */
.input-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
input[type=number], input[type=text] {
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px; color: var(--text); font-size: 16px; font-weight: 600;
  width: 100%; outline: none; font-family: 'DM Sans', sans-serif;
  -webkit-appearance: none; appearance: none;
}
input:focus { border-color: var(--accent-border); }
input::placeholder { color: var(--muted2); font-weight: 400; }

/* ── BUTTONS ── */
.btn {
  display: block; width: 100%; padding: 13px 18px; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer; border: none;
  font-family: 'DM Sans', sans-serif; transition: opacity 0.15s, transform 0.1s;
}
.btn:active { opacity: 0.85; transform: scale(0.98); }
.btn-primary { background: var(--accent); color: #0d0d0d; }
.btn-ghost { background: var(--card2); color: var(--text); border: 1px solid var(--border); width: auto; padding: 9px 16px; }
.btn-danger { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }

/* ── MUSCLE GRID ── */
.muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.muscle-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 13px;
  padding: 16px 14px; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s;
}
.muscle-btn:active { background: var(--accent-dim); border-color: var(--accent-border); }
.muscle-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
.muscle-last { font-size: 11px; color: var(--muted); }

/* ── EXERCISE SCROLL TABS ── */
.ex-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.ex-tabs::-webkit-scrollbar { display: none; }
.ex-tab {
  padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: var(--card2); color: var(--muted); cursor: pointer; border: none;
  white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  flex-shrink: 0;
}
.ex-tab.active { background: var(--accent); color: #0d0d0d; }

/* ── SET ROWS ── */
.set-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card2); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.set-num { font-size: 11px; color: var(--muted); width: 36px; flex-shrink: 0; }
.set-detail { flex: 1; font-size: 14px; font-weight: 600; }
.set-kg { color: var(--accent); }
.set-del { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
.set-del:active { color: #ef4444; }

/* ── TWO COL INPUT ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

/* ── PILL ── */
.pill {
  display: inline-block; font-size: 10px; font-weight: 700;
  background: var(--accent-dim); color: var(--accent);
  padding: 2px 10px; border-radius: 20px; margin-left: 8px;
}

/* ── STAT BOXES ── */
.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; text-align: center; }
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── HISTORY ROWS ── */
.hist-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 12px; color: var(--muted); }
.hist-val { font-size: 14px; font-weight: 700; color: var(--accent); }

/* ── CHART ── */
.chart-wrap { padding: 4px 0 8px; }
svg.chart { width: 100%; overflow: visible; }

/* ── PROGRESS TOGGLE ── */
.prog-toggle { display: flex; gap: 8px; margin-bottom: 14px; }

/* ── SUCCESS SCREEN ── */
.success { text-align: center; padding: 50px 20px; }
.success-icon { font-size: 64px; margin-bottom: 16px; }
.success-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; margin-bottom: 8px; }
.success-sub { font-size: 13px; color: var(--muted); margin-bottom: 30px; }

/* ── INSTALL BANNER ── */
#install-banner {
  display: none; position: fixed; bottom: calc(var(--safe-bottom) + 16px);
  left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #0d0d0d; font-weight: 700; font-size: 13px;
  padding: 12px 24px; border-radius: 30px; cursor: pointer; z-index: 200;
  box-shadow: 0 4px 24px rgba(200,255,0,0.3); border: none; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

/* ── GOAL BAR ── */
.goal-bar-wrap { margin-bottom: 14px; }
.goal-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.goal-bar-track { background: var(--card2); border-radius: 100px; height: 8px; overflow: hidden; }
.goal-bar-fill { height: 100%; background: linear-gradient(90deg, #ff6b2b, var(--accent)); border-radius: 100px; transition: width 0.6s ease; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── SECTION LABEL ── */
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 18px 0 10px; }

/* ── PR ROW ── */
.pr-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-name { font-size: 13px; color: #ccc; }
.pr-val { font-size: 13px; font-weight: 700; color: var(--accent); }

/* ── BACK ROW ── */
.back-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.back-row h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-tag">BULK LOG · 67→85KG</div>
    <div class="header-main">
      <div class="header-title">BULK <span class="header-kg" id="header-kg">LOG</span></div>
      <div id="header-badge" style="display:none; background:var(--accent-dim); border:1px solid var(--accent-border); border-radius:8px; padding:4px 10px; font-size:12px; font-weight:700; color:var(--accent);"></div>
    </div>
    <div class="header-sub" id="header-sub">Track lifts · body weight · progress</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('log')">🏋️ Log</button>
    <button class="tab-btn" onclick="switchTab('weight')">⚖️ Weight</button>
    <button class="tab-btn" onclick="switchTab('progress')">📈 Progress</button>
  </div>

  <div class="body" id="main-body">
    <!-- injected by JS -->
  </div>
</div>

<button id="install-banner" onclick="installApp()">⬇ Install App on Phone</button>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let workouts = JSON.parse(localStorage.getItem("bl_workouts") || "[]");
let weights  = JSON.parse(localStorage.getItem("bl_weights")  || "[]");

const MUSCLES = ["Chest","Back","Legs","Shoulders","Biceps","Triceps","Core"];
const EXERCISES = {
  Chest:     ["Bench Press","Incline DB Press","Cable Flyes","Push Ups","Chest Dips"],
  Back:      ["Deadlift","Pull Ups","Barbell Row","Lat Pulldown","Face Pulls"],
  Legs:      ["Squats","Leg Press","Romanian Deadlift","Leg Curl","Calf Raises"],
  Shoulders: ["Overhead Press","Lateral Raises","Front Raises","Shrugs","Rear Delt Flyes"],
  Biceps:    ["Barbell Curl","Hammer Curl","Concentration Curl","Incline Curl"],
  Triceps:   ["Skull Crushers","Tricep Dips","Close-Grip Bench","Tricep Pushdown"],
  Core:      ["Planks","Cable Crunches","Leg Raises","Russian Twists","Ab Wheel"],
};

let currentTab = "log";
let logStep = "pick"; // pick | session | done
let sessionMuscle = null;
let sessionExercises = []; // [{name, sets:[{kg,reps}]}]
let activeExIdx = 0;
let progView = "weight";
let progMuscle = "Chest";
let progExercise = "Bench Press";

// ── PERSIST ───────────────────────────────────────────────────────
function saveWorkouts() { localStorage.setItem("bl_workouts", JSON.stringify(workouts)); }
function saveWeights()  { localStorage.setItem("bl_weights",  JSON.stringify(weights));  }

// ── UTILS ─────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { const dt = new Date(d+"T00:00:00"); return `${dt.getDate()}/${dt.getMonth()+1}`; }
function fmtDateFull(d) { const dt = new Date(d+"T00:00:00"); return dt.toLocaleDateString("en-KE",{day:"numeric",month:"short"}); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

// ── HEADER ────────────────────────────────────────────────────────
function updateHeader() {
  const latest = weights.length ? weights[weights.length-1] : null;
  const start  = weights.length ? weights[0] : null;
  if (latest) {
    document.getElementById("header-kg").textContent = latest.kg + " KG";
    const diff = (latest.kg - 67).toFixed(1);
    const badge = document.getElementById("header-badge");
    badge.style.display = "block";
    badge.textContent = `+${diff > 0 ? diff : 0} kg gained`;
    document.getElementById("header-sub").textContent =
      `${(85 - latest.kg).toFixed(1)} kg to goal · Target: 85 kg`;
  }
}

// ── TAB SWITCH ────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    b.classList.toggle("active", ["log","weight","progress"][i] === tab);
  });
  if (tab === "log") logStep = "pick";
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  updateHeader();
  const body = document.getElementById("main-body");
  if (currentTab === "log")      body.innerHTML = renderLog();
  if (currentTab === "weight")   body.innerHTML = renderWeight();
  if (currentTab === "progress") body.innerHTML = renderProgress();
}

// ── LOG TAB ───────────────────────────────────────────────────────
function renderLog() {
  if (logStep === "pick")    return renderPick();
  if (logStep === "session") return renderSession();
  if (logStep === "done")    return renderDone();
}

function renderPick() {
  const grid = MUSCLES.map(m => {
    const last = workouts.find(w => w.muscle === m);
    return `<div class="muscle-btn" onclick="startSession('${m}')">
      <div class="muscle-name">${m}</div>
      <div class="muscle-last">${last ? "Last: " + fmtDateFull(last.date) : "Not logged yet"}</div>
    </div>`;
  }).join("");

  let recent = "";
  if (workouts.length) {
    recent = `<div class="section-label">Recent Sessions</div>` +
      workouts.slice(0,5).map(w => {
        const exList = w.exercises.map(ex => {
          const maxKg = Math.max(...ex.sets.map(s=>s.kg));
          return `<div style="font-size:12px;color:var(--muted);margin-bottom:2px"><span style="color:#ccc">${esc(ex.name)}</span> — ${ex.sets.length} sets · max ${maxKg} kg</div>`;
        }).join("");
        return `<div class="card">
          <div class="card-head">
            <div class="card-title">${w.muscle}<span class="pill">${w.exercises.length} ex</span></div>
            <div class="card-meta">${fmtDateFull(w.date)}</div>
          </div>
          <div class="card-body">${exList}</div>
        </div>`;
      }).join("");
  }

  return `<div class="muscle-grid">${grid}</div>${recent}`;
}

function renderSession() {
  const tabs = sessionExercises.map((ex, i) => {
    const done = ex.sets.length > 0 ? ` ✓${ex.sets.length}` : "";
    return `<button class="ex-tab ${i===activeExIdx?"active":""}" onclick="setActiveEx(${i})">${esc(ex.name.split(" ")[0])}${done}</button>`;
  }).join("");

  const ex = sessionExercises[activeExIdx];
  const setRows = ex.sets.map((s,i) =>
    `<div class="set-row">
      <div class="set-num">Set ${i+1}</div>
      <div class="set-detail"><span class="set-kg">${s.kg} kg</span> × ${s.reps} reps</div>
      <button class="set-del" onclick="removeSet(${activeExIdx},${i})">×</button>
    </div>`
  ).join("");

  return `
    <div class="back-row">
      <button class="btn btn-ghost btn-sm" onclick="logStep='pick';render()">← Back</button>
      <h2>${esc(sessionMuscle)}</h2>
    </div>
    <div class="ex-tabs">${tabs}</div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">${esc(ex.name)}</div>
        <div class="card-meta">${ex.sets.length} sets logged</div>
      </div>
      <div class="card-body">
        ${setRows || `<div class="empty" style="padding:16px 0 8px"><div class="empty-icon">💪</div>Log your first set</div>`}
        <div style="margin-top:12px">
          <div class="input-label">Add Set</div>
          <div class="two-col">
            <div>
              <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Weight (kg)</div>
              <input type="number" inputmode="decimal" id="inp-kg" placeholder="e.g. 60" step="0.5"/>
            </div>
            <div>
              <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Reps</div>
              <input type="number" inputmode="numeric" id="inp-reps" placeholder="e.g. 10"/>
            </div>
          </div>
          <button class="btn btn-primary" onclick="addSet()">+ Add Set</button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:8px;font-size:15px;padding:15px" onclick="finishSession()">✓ Finish & Save Session</button>
  `;
}

function renderDone() {
  const w = workouts[0];
  const totalSets = w.exercises.reduce((a,ex) => a + ex.sets.length, 0);
  return `
    <div class="success">
      <div class="success-icon">🏆</div>
      <div class="success-title">Session Saved!</div>
      <div class="success-sub">${esc(sessionMuscle)} · ${w.exercises.length} exercises · ${totalSets} total sets</div>
      <button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="logStep='pick';render()">Log Another</button>
    </div>`;
}

function startSession(muscle) {
  sessionMuscle = muscle;
  sessionExercises = EXERCISES[muscle].map(n => ({ name: n, sets: [] }));
  activeExIdx = 0;
  logStep = "session";
  render();
}

function setActiveEx(i) { activeExIdx = i; render(); }

function addSet() {
  const kg = parseFloat(document.getElementById("inp-kg").value);
  const reps = parseInt(document.getElementById("inp-reps").value);
  if (!kg || !reps || kg <= 0 || reps <= 0) {
    document.getElementById("inp-kg").style.borderColor = "#ef4444";
    setTimeout(() => document.getElementById("inp-kg").style.borderColor = "", 800);
    return;
  }
  sessionExercises[activeExIdx].sets.push({ kg, reps });
  render();
}

function removeSet(exIdx, setIdx) {
  sessionExercises[exIdx].sets.splice(setIdx, 1);
  render();
}

function finishSession() {
  const done = sessionExercises.filter(ex => ex.sets.length > 0);
  if (!done.length) { alert("Log at least one set before finishing!"); return; }
  workouts.unshift({ date: today(), muscle: sessionMuscle, exercises: done });
  saveWorkouts();
  logStep = "done";
  render();
}

// ── WEIGHT TAB ────────────────────────────────────────────────────
function renderWeight() {
  const latest = weights.length ? weights[weights.length-1] : null;
  const start  = weights.length ? weights[0] : null;
  const gained = latest && start ? (latest.kg - start.kg).toFixed(1) : 0;
  const toGoal = latest ? (85 - latest.kg).toFixed(1) : 18;
  const pct    = latest ? Math.min(100, Math.max(2, ((latest.kg - 67) / 18) * 100)) : 2;

  const statsHtml = latest ? `
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${latest.kg}</div><div class="stat-lbl">Current (kg)</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--green)">+${gained > 0 ? gained : 0}</div><div class="stat-lbl">Gained (kg)</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--blue)">${toGoal > 0 ? toGoal : 0}</div><div class="stat-lbl">To Goal (kg)</div></div>
    </div>
    <div class="goal-bar-wrap">
      <div class="goal-bar-labels"><span>67 kg start</span><span>Goal: 85 kg</span></div>
      <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
    </div>` : "";

  const histRows = weights.slice().reverse().slice(0,12).map((w,i,arr) => {
    const prev = arr[i+1];
    const diff = prev ? (w.kg - prev.kg).toFixed(1) : null;
    const diffHtml = diff !== null
      ? `<span style="font-size:11px;color:${diff>=0?"var(--green)":"#ef4444"};margin-left:8px">${diff>=0?"+":""}${diff}</span>`
      : "";
    return `<div class="hist-row">
      <div class="hist-date">${fmtDateFull(w.date)}</div>
      <div class="hist-val">${w.kg} kg${diffHtml}</div>
    </div>`;
  }).join("");

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">Log Today's Weight</div></div>
      <div class="card-body">
        <div class="input-label">Body Weight (kg)</div>
        <input type="number" inputmode="decimal" id="weight-inp" placeholder="e.g. 68.5" step="0.1" style="margin-bottom:12px"/>
        <button class="btn btn-primary" onclick="logWeight()">Save Weight</button>
      </div>
    </div>
    ${statsHtml}
    ${weights.length ? `<div class="card">
      <div class="card-head"><div class="card-title">History</div><div class="card-meta">Last ${Math.min(12,weights.length)} entries</div></div>
      <div class="card-body">${histRows}</div>
    </div>` : ""}
  `;
}

function logWeight() {
  const val = parseFloat(document.getElementById("weight-inp").value);
  if (!val || val < 30 || val > 200) {
    document.getElementById("weight-inp").style.borderColor = "#ef4444";
    setTimeout(() => document.getElementById("weight-inp").style.borderColor="",800);
    return;
  }
  const filtered = weights.filter(w => w.date !== today());
  weights = [...filtered, { date: today(), kg: val }].sort((a,b)=>a.date.localeCompare(b.date));
  saveWeights();
  render();
}

// ── PROGRESS TAB ──────────────────────────────────────────────────
function renderProgress() {
  const toggles = `
    <div class="prog-toggle">
      <button class="ex-tab ${progView==="weight"?"active":""}" onclick="progView='weight';render()">Body Weight</button>
      <button class="ex-tab ${progView==="exercise"?"active":""}" onclick="progView='exercise';render()">Lift Progress</button>
    </div>`;

  if (progView === "weight") {
    const data = weights.slice(-16).map(w => ({ v: w.kg, l: fmtDate(w.date) }));
    return toggles + `
      <div class="card">
        <div class="card-head">
          <div class="card-title">Body Weight Over Time</div>
          <div class="card-meta">Goal: 85 kg</div>
        </div>
        <div class="card-body">
          <div class="chart-wrap">${renderChart(data, "var(--accent)")}</div>
          ${data.length < 2 ? `<div class="empty"><div class="empty-icon">📊</div>Log weight on 2+ days to see chart</div>` : ""}
        </div>
      </div>`;
  }

  // Exercise progress
  const muscleTabs = MUSCLES.map(m =>
    `<button class="ex-tab ${progMuscle===m?"active":""}" onclick="progMuscle='${m}';progExercise='${EXERCISES[m][0]}';render()">${m}</button>`
  ).join("");

  const exTabs = EXERCISES[progMuscle].map(ex =>
    `<button class="ex-tab ${progExercise===ex?"active":""}" style="font-size:11px" onclick="progExercise='${esc(ex)}';render()">${esc(ex)}</button>`
  ).join("");

  const chartData = workouts
    .filter(w => w.muscle === progMuscle)
    .flatMap(w => w.exercises.filter(ex => ex.name === progExercise).map(ex => ({
      v: Math.max(...ex.sets.map(s=>s.kg)), l: fmtDate(w.date)
    })))
    .sort((a,b) => a.l.localeCompare(b.l)).slice(-12);

  // PRs
  const prRows = EXERCISES[progMuscle].map(ex => {
    const allSets = workouts.filter(w=>w.muscle===progMuscle)
      .flatMap(w=>w.exercises.filter(e=>e.name===ex).flatMap(e=>e.sets));
    if (!allSets.length) return null;
    const pr = Math.max(...allSets.map(s=>s.kg));
    return `<div class="pr-row"><div class="pr-name">${esc(ex)}</div><div class="pr-val">${pr} kg PR</div></div>`;
  }).filter(Boolean).join("");

  return `${toggles}
    <div class="ex-tabs">${muscleTabs}</div>
    <div class="ex-tabs">${exTabs}</div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">${esc(progExercise)}</div>
        <div class="card-meta">Max weight per session</div>
      </div>
      <div class="card-body">
        <div class="chart-wrap">${renderChart(chartData, "var(--blue)")}</div>
        ${chartData.length < 2 ? `<div class="empty"><div class="empty-icon">📊</div>Log ${esc(progExercise)} on 2+ sessions to see chart</div>` : ""}
      </div>
    </div>
    ${prRows ? `<div class="card">
      <div class="card-head"><div class="card-title">Personal Records — ${esc(progMuscle)}</div></div>
      <div class="card-body">${prRows}</div>
    </div>` : ""}`;
}

function renderChart(data, color) {
  if (!data || data.length < 2) return "";
  const W=320, H=110, PL=30, PR=12, PT=14, PB=22;
  const vals = data.map(d=>d.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const cx = (W-PL-PR), cy = (H-PT-PB);
  const pts = data.map((d,i) => ({
    x: PL + (i/(data.length-1))*cx,
    y: PT + (1-(d.v-min)/range)*cy,
    l: d.l, v: d.v
  }));
  const path = pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const fill = path + ` L${pts[pts.length-1].x},${H-PB} L${pts[0].x},${H-PB} Z`;

  const gridLines = [0,0.5,1].map(t => {
    const y = PT + t*cy;
    const v = (min+(1-t)*range).toFixed(1);
    return `<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="#252525" stroke-width="1"/>
            <text x="${PL-4}" y="${y+4}" fill="#555" font-size="9" text-anchor="end">${v}</text>`;
  }).join("");

  const xLabels = [0, Math.floor(data.length/2), data.length-1]
    .filter((v,i,a)=>a.indexOf(v)===i)
    .map(i => `<text x="${pts[i].x}" y="${H-4}" fill="#555" font-size="9" text-anchor="middle">${pts[i].l}</text>`)
    .join("");

  const id = "g" + Math.random().toString(36).slice(2);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${fill}" fill="url(#${id})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}" stroke="#141414" stroke-width="2"/>`).join("")}
    ${xLabels}
  </svg>`;
}

// ── PWA INSTALL ───────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").style.display = "block";
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById("install-banner").style.display = "none";
    });
  }
}
window.addEventListener("appinstalled", () => {
  document.getElementById("install-banner").style.display = "none";
});

// ── SERVICE WORKER ────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "bulklog-v1";
    const ASSETS = [self.location.href];
    self.addEventListener("install", e => e.waitUntil(
      caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
    ));
    self.addEventListener("activate", e => e.waitUntil(
      caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))
        .then(() => self.clients.claim())
    ));
    self.addEventListener("fetch", e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }))
    ));
  `;
  const swBlob = new Blob([swCode], { type: "application/javascript" });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

// ── INIT ──────────────────────────────────────────────────────────
render();
</script>
